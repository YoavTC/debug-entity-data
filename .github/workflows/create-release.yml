on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
      release_name:
        description: "Release title (e.g. Debug Entity Data v1.0)"
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update pack.mcmeta
        env:
          RELEASE_NAME: ${{ github.event.inputs.release_name }}
        run: |
          jq --arg name "$RELEASE_NAME" \
            '.pack.description[0].text = $name + "\n"' \
            src/pack.mcmeta > tmp.json && mv tmp.json src/pack.mcmeta

      - name: Build zip
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          cd src
          zip -r "../debug-entity-data-$VERSION.zip" .

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          RELEASE_NAME: ${{ github.event.inputs.release_name }}
        run: |
          gh release create "v$VERSION" \
            "debug-entity-data-$VERSION.zip" \
            --title "$RELEASE_NAME" \
            --notes ""